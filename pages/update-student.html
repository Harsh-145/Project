<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Update Student Information</h2>

        <div id="statusMessage"></div>

        <form method="POST" action="update-student.php" id="updateStudentForm">
            <div class="form-group">
                <label for="enrollment_no">Enrollment No:</label>
                <input type="number" id="enrollment_no" name="enrollment_no" class="no-spin" required>
            </div>

            <div class="form-group">
                <label for="full_name">Full Name:</label>
                <input type="text" id="full_name" name="full_name">
            </div>

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender">
                    <option value="">Select (no change)</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob">
            </div>

            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="room_no">Room No:</label>
                <input type="number" id="room_no" name="room_no" class="no-spin">
            </div>

            <div class="form-group">
                <label for="sem">Semester:</label>
                <input type="number" id="sem" name="sem" min="1" class="no-spin">
            </div>

            <button type="submit">Update Student</button>
        </form>

        <a href="dashboard.html" class="back-link">Back to Dashboard</a>
    </div>

    <script src="../assets/js/validation.js"></script>
    <script src="../assets/js/status.js"></script>
</body>
</html>
